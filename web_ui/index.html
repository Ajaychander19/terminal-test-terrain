<!DOCTYPE html>

<html lang="en-US" xmlns="http://www.w3.org/1999/xhtml">
    <head>

		<meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
	
		<script type='text/javascript' src='library/d3/d3.min.js'></script>
		<script type='text/javascript' src='library/d3/d3-hexbin.min.js'></script>
		<script type='text/javascript' src='library/jquery-3.3.1.min.js '></script>

		<script type='text/javascript' src='library/leaflet/leaflet.js'></script>
		<script type='text/javascript' src='library/leaflet/leaflet-heat.js'></script>

		<script type='text/javascript' src='library/turfjs/turf.min.js'></script>
		<script type='text/javascript' src='library/d3/leaflet-d3.min.js'></script>


		<script type='text/javascript' src='library/canvas/QuadTree.js'></script>
		<script type='text/javascript' src='library/canvas/L.GridLayer.MaskCanvas.js'></script>

		<script type='text/javascript' src='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\js\bootstrap.js'></script>
		<script type='text/javascript' src='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\js\bootstrap-toggle.min.js'></script>

		<script type='text/javascript' src='library/jquery.tmpl.min.js '></script>

		<script type="text/javascript" src="scripts/csvread.js"></script>
		<script type="text/javascript" src="scripts/utils.js"></script>
		<script type="text/javascript" src="scripts/processing.js"></script>
		<script type="text/javascript" src="scripts/drawing.js"></script>
		<script type="text/javascript" src="scripts/styles.js"></script>

		<link rel="stylesheet" href="styles/frontstyle.css" />
		<link rel="stylesheet" href='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\css\bootstrap.css'>
		<link rel="stylesheet" href='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\js\awesome-bootstrap-checkbox.css'>
		<link rel="stylesheet" href='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\css\bootstrap-theme.css'>
		<link rel="stylesheet" href='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\css\bootstrap-theme.css'>
		<link rel="stylesheet" href='library/bootstrap-3.3.7\bootstrap-3.3.7-dist\css\bootstrap-toggle.min.css'>
		<link rel="stylesheet" type="text/css" href="library/leaflet/leaflet.css" />

		<!-- <input type="file" id="fileElem" multiple style="display:none" onchange="myFunction()" accept=".json"> -->
		<input type="file" id="fileElem" multiple style="display:none" accept=".csv">
		

   </head>

	<body>
	
		<div class="container-fluid">
			<div class="class=col-sm-4  text-center">
				<h1>COVERAGE OF 4G BASE STATIONS  </h1>
			</div>
			<div class="col-sm-9">
				 <div id="map"></div>
				 <div class="panel-heading">ORIGINAL PROGRAM DEVELOPED BY HOANG TRIEU.<br>2022 VERSION OF THE PROGRAM BY KILLIAN CALLAC</div>
			</div>

			<div id="tool-div" class="col-sm-3">
				<div class="panel panel-success">
					<button type="button" id="fileSelect" class="btn btn-success  btn-block">Select Site And Association Files</button>
				</div>

				<!-- <div class="panel panel-success">
					<button type="button" id="Base Station" class="btn btn-primary  btn-block " >Load Base Stations</button>

				</div> -->


				<div class="panel panel-success visu-params">

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox"  id="ColorAlt">
						<label for="ColorAlt">Alternative Color for PCI (reload BS, please) </label>
									</div>
					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox"  id="Theory_Cell">
						<label for="Theory_Cell">Theoretical Cell</label>
					</div>

					<label class="checkbox-inline">
					  <input type="checkbox" id="toggle_withoutTraces" checked data-toggle="toggle"> Serving site without the traces
					</label>

				</div>

				<div class="panel panel-success visu-params">
					<div class="panel-heading">Cell characteristics</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox"  id="Tracking_area">
						<label for="Tracking_area">Tracking Areas</label>
					</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox"  id="PCI">
						<label for="PCI">PCI</label>
					</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox" id="RSRP">
						<label for="RSRP">RSRP</label>
					</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox" id="rsrq">
						<label for="rsrq">RSRQ</label>
					</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox" id="rssi">
						<label for="rssi">RSSI</label>
					</div>

					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox" id="cinr">
						<label for="cinr">CINR</label>
					</div>

					<!-- To remove -->
					<div class="checkbox checkbox-primary">
						<input class="styled" type="checkbox"  id="RSRP_offset">
						<label for="RSRP_offset">First neighbour RSRP offset </label>
					</div>
				</div>

				<div class="panel panel-success visu-params">
					<div class="panel-heading">Sites</div>
					<div id="myDiv" class="form-group">
						<select class="form-control selectpicker" id="sites-select">
							<option value="all-sites">All sites</option>
							<option value="only-sites">Only selected sites</option>
						</select>
						<!-- <label for="site-select"></label> -->
					</div>
				</div>

				<div class="panel panel-success visu-params">
					<div class="panel-heading">EARFCN</div>
					<select class="form-control selectpicker" id="EARFCN_select">
						<option value="serving-earfcn">Serving EARFCN</option>
						<option value="all-earfcns">All EARFCNs</option>
					</select>
				</div>

				<div class="panel panel-success visu-params">
					<div class="panel-heading">PCI</div>
					<div id="pci_div" class="form-group">
						<!-- Maybe temporary -->
						<label for="pci-select"></label>
						<select class="form-control selectpicker" id="pci-select">
							<option value='serving-pci'>Serving PCI</option>
							<option value="all-pcis">All PCIs</option>
						</select>
					</div>
				</div>

				<div class="panel panel-success visu-params">
					<button type="button" id="clear-all" class="btn btn-primary  btn-block " >Clear All</button>
				</div>

				<!--<div class="panel panel-success">
					<button type="button" id="turn_off_server" class="btn btn-primary  btn-block " >shutdown the Server</button>
				</div>-->
			</div>
		</div>

		<div class="modal fade" id="myModal" role="dialog">
			<div class="modal-dialog">
				<!-- Modal content-->
				<div class="modal-content">
					<div class="modal-body">
						<p></p>
					</div>
					<div class="modal-footer">
						<button type="button" class="btn btn-default" data-dismiss="modal">Close</button>
					</div>
				</div>
			</div>
		</div>
		
		<div id='tempID' class='hide'></div>

		<!-- TODO Check for XSS vuln -->
		<script id='checkbox_pci' type='text/x-jquery-tmpl'>
			<div>
				<span name='title' data-value="${Title}" >
					${Title}
				</span>
				<div>
				{{if PCIs}}
					{{each PCIs}}
								<input type="checkbox" data-markerId="${MarkerId}" data-value="false" onclick="check_pci($(this), ${Title}, ${$value.pcis}, ${$value.earfcn})" value="${$pci}">${$value.pcis} - ${$value.earfcn}<br>
					{{/each}}
				{{/if}}
				</div>
			</div>
		</script>

		<!-- Main script moved to scripts/app.js -->
		<script src="scripts/app.js"></script>
		<!-- <script src="scripts/old_app.js"></script> -->
	
   </body>
</html>
